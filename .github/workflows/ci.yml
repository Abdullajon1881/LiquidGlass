name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  android:
    name: Build & test (Android)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Unit tests (core + compose + view)
        run: ./gradlew test --console=plain

      - name: Assemble sample APK
        run: ./gradlew :sample:assembleDebug --console=plain

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: '**/build/reports/tests/'

  expo-typescript:
    name: Typecheck (expo-liquid-glass)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/expo-liquid-glass
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install --no-audit --no-fund
      - run: npx tsc --noEmit

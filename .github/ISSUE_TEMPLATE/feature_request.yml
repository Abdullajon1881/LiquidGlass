name: ✨ Feature request
description: Suggest a capability, API, or improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: The use case, not just the feature. What can't you do today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed API or behavior
      description: Sketch the modifier / prop / component you have in mind.
      render: kotlin
    validations:
      required: false
  - type: dropdown
    id: platform
    attributes:
      label: Which surface?
      multiple: true
      options:
        - Jetpack Compose
        - Classic Views
        - React Native / Expo
        - Core / shader
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false

apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'

group = 'expo.modules.liquidglass'
version = '1.0.0'

def safeExtGet(prop, fallback) {
  rootProject.ext.has(prop) ? rootProject.ext.get(prop) : fallback
}

android {
  namespace 'expo.modules.liquidglass'
  compileSdkVersion safeExtGet('compileSdkVersion', 35)

  defaultConfig {
    minSdkVersion safeExtGet('minSdkVersion', 24)
    targetSdkVersion safeExtGet('targetSdkVersion', 35)
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_17
    targetCompatibility JavaVersion.VERSION_17
  }

  kotlinOptions {
    jvmTarget = '17'
  }

  lintOptions {
    abortOnError false
  }
}

repositories {
  mavenCentral()
  google()
}

dependencies {
  implementation project(':expo-modules-core')
  // The Liquid Glass engine (dev.liquidglass.core + dev.liquidglass.view) is
  // vendored under src/main/java, so this package is fully self-contained —
  // no external Maven artifact is required to build it on Android.
  implementation 'androidx.annotation:annotation:1.9.1'
}
